function refreshCounts() {
  const pool = getPool();
  const opts = [5, 10, 15, 20, 30, 50].filter(n => n <= pool.length);
  opts.push(pool.length);

  countSelect.innerHTML = uniq.map(n => '<option value="' + n + '">' + n + (n === pool.length ? ' (all)' : '') + '</option>').join('');

function getPool() {
  const sec = sectionSelect.value || 'all';
  return sec === 'all' ? CARDS : CARDS.filter(c => c.s === sec);

    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestion(card) {
  const askFront = Math.random() < 0.5;
  const prompt = askFront ? card.f : card.b;
  const label = askFront ? 'Which service or concept is this?' : 'What does this do?';
  const correct = askFront ? card.b : card.f;
  const others = shuffle(CARDS.filter(c => c !== card));
  const distractors = [];
  for (const c of others) {
    const val = askFront ? c.b : c.f;
    if (val !== correct && !distractors.includes(val)) distractors.push(val);
    if (distractors.length === 3) break;
  }
  const options = shuffle([correct, ...distractors]);
  return { label, prompt, correct, options };
}

document.getElementById('quiz-start-btn').addEventListener('click', () => {
  const pool = getPool();
  const n = parseInt(countSelect.value, 10);
  quizCards = shuffle(pool).slice(0, n);
  idx = 0;
  score = 0;
  missed = [];
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  renderQuestion();
});

function renderQuestion() {
  locked = false;
  const card = quizCards[idx];
  const q = buildQuestion(card);
  document.getElementById('quiz-progress-text').textContent = 'Question ' + (idx + 1) + ' of ' + quizCards.length;
  document.getElementById('quiz-score-text').textContent = 'Score: ' + score;
  document.getElementById('quiz-progress-fill').style.width = Math.round((idx / quizCards.length) * 100) + '%';
  document.getElementById('quiz-question-label').textContent = q.label + '  ·  ' + card.s;
  document.getElementById('quiz-question-text').textContent = q.prompt;
  const feedback = document.getElementById('quiz-feedback');
  feedback.textContent = '';
  feedback.className = 'quiz-feedback';
  document.getElementById('quiz-next-btn').style.display = 'none';

  const optWrap = document.getElementById('quiz-options');
  optWrap.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectOption(opt, q, card, btn));
    optWrap.appendChild(btn);
  });
}

function selectOption(opt, q, card, btn) {
  if (locked) return;
  locked = true;
  const isCorrect = opt === q.correct;
  const feedback = document.getElementById('quiz-feedback');

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    feedback.textContent = 'Correct.';
    feedback.className = 'quiz-feedback correct';
  } else {
    btn.classList.add('incorrect');
    feedback.textContent = 'Not quite. Correct answer: ' + q.correct;
    feedback.className = 'quiz-feedback incorrect';
    missed.push({ prompt: q.prompt, correct: q.correct, given: opt, section: card.s });
  }

  [...document.getElementById('quiz-options').children].forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
  });

  document.getElementById('quiz-score-text').textContent = 'Score: ' + score;
  document.getElementById('quiz-next-btn').style.display = 'block';
}

document.getElementById('quiz-next-btn').addEventListener('click', () => {
  idx++;
  if (idx >= quizCards.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

function showResults() {
  document.getElementById('quiz-progress-fill').style.width = '100%';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'block';

  const pct = Math.round((score / quizCards.length) * 100);
  document.getElementById('quiz-final-score').textContent = score + '/' + quizCards.length;
  document.getElementById('quiz-final-pct').textContent = pct + '%';

  const reviewList = document.getElementById('quiz-review-list');
  if (missed.length === 0) {
    reviewList.innerHTML = '<p style="color: var(--white-dim); font-family: var(--font-mono); font-size: 0.85rem;">No misses. Clean sweep.</p>';
  } else {
    reviewList.innerHTML = missed.map(m => `
      <div class="quiz-review-item">
        <span class="quiz-review-section">${m.section}</span>
        <p class="quiz-review-prompt">${m.prompt}</p>
        <p class="quiz-review-given">Your answer: ${m.given}</p>
        <p class="quiz-review-correct">Correct: ${m.correct}</p>
      </div>
    `).join('');
  }
}

document.getElementById('quiz-restart-btn').addEventListener('click', () => {
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-setup').style.display = 'block';
});
</script>
