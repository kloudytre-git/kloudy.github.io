const CARDS_EXAM = [{"s": "Compute Suite", "f": "Auto Scaling", "b": "Automatically adjusts EC2 capacity. Benefit/Use: Cost efficiency", "q": "A company wants the number of EC2 instances behind its application to automatically increase during traffic spikes and decrease afterward to control cost."}, {"s": "Compute Suite", "f": "EC2", "b": "Elastic Compute Cloud virtual machines. Benefit/Use: Virtual servers", "q": "A company needs resizable virtual servers in the cloud where it retains full control over the operating system and installed software."}, {"s": "Compute Suite", "f": "ECS", "b": "Managed container service. Benefit/Use: Container orchestration", "q": "A company wants to run and orchestrate Docker containers on AWS using a proprietary container orchestration service tightly integrated with other AWS services."}, {"s": "Compute Suite", "f": "EKS", "b": "Managed Kubernetes service. Benefit/Use: Container orchestration", "q": "A company already running containerized applications with Kubernetes wants a managed control plane so it doesn't have to install and operate its own clusters."}, {"s": "Compute Suite", "f": "Elastic Beanstalk", "b": "Platform as a service for web apps. Benefit/Use: Simplified deployment", "q": "A developer wants to upload application code and have AWS automatically handle deployment details, including capacity provisioning, load balancing, and scaling."}, {"s": "Compute Suite", "f": "Fargate", "b": "Serverless compute for containers. Benefit/Use: Container management without servers", "q": "A company wants to run containers without provisioning or managing the underlying EC2 instances or clusters at all."}, {"s": "Compute Suite", "f": "Lambda", "b": "Run code without managing servers. Benefit/Use: Serverless", "q": "A developer wants to run short-lived backend code in response to events without provisioning or managing any servers, paying only for the compute time consumed."}, {"s": "Compute Suite", "f": "Lightsail", "b": "Simple virtual server service. Benefit/Use: Easy VM deployment", "q": "A small business owner with no cloud experience wants to quickly launch a simple virtual private server with a predictable, bundled monthly price."}, {"s": "Storage Options", "f": "Block Storage", "b": "Service that provides block-level storage volumes for use with virtual machines. Benefit/Use: High-performance storage", "q": "A database application requires low-latency, raw storage volumes that behave like a locally attached disk, which it can format with its own file system."}, {"s": "Storage Options", "f": "EBS", "b": "Persistent EC2 storage. Benefit/Use: Block storage", "q": "An EC2 instance needs persistent block-level storage that remains available even after the instance is stopped, similar to an external hard drive."}, {"s": "Storage Options", "f": "EBS Snapshot", "b": "Point-in-time backup of an EBS volume. Benefit/Use: Data protection and recovery", "q": "Before making a risky change to a server, an administrator wants to take a point-in-time backup of its attached storage volume, stored durably in S3."}, {"s": "Storage Options", "f": "EBS Volume", "b": "Block storage device that can be attached to an EC2 instance. Benefit/Use: Persistent storage", "q": "An EC2 instance needs an attachable block storage device to install and run its operating system and applications."}, {"s": "Storage Options", "f": "EFS", "b": "Elastic shared file storage. Benefit/Use: Shared storage", "q": "Multiple EC2 instances across different Availability Zones need to simultaneously read and write to the same shared file system."}, {"s": "Storage Options", "f": "FSx", "b": "Managed Windows file system. Benefit/Use: Shared storage", "q": "A company migrating Windows-based applications to AWS needs a fully managed native Windows file system that supports the SMB protocol."}, {"s": "Storage Options", "f": "File Storage", "b": "Service that provides file-level storage accessible over a network. Benefit/Use: Shared file access", "q": "An application needs to read and write data using a familiar folder and file-path structure that can be mounted and shared across multiple servers over a network."}, {"s": "Storage Options", "f": "Glacier", "b": "Low-cost archival storage. Benefit/Use: Archive", "q": "A company needs to retain compliance records for seven years and rarely accesses them, so it wants the lowest possible cost for long-term archival storage."}, {"s": "Storage Options", "f": "Object Storage", "b": "Service that stores data as objects with metadata and unique identifiers. Benefit/Use: Scalable and durable storage", "q": "A company needs to store billions of files of any type, each with associated metadata and a unique identifier, accessible through a simple API rather than a file system."}, {"s": "Storage Options", "f": "S3", "b": "Highly durable object storage service. Benefit/Use: Object storage", "q": "A company needs a highly durable place to store and retrieve any amount of unstructured data, such as images and backups, over the internet."}, {"s": "Storage Options", "f": "S3 Infrequent Access (IA)", "b": "Storage class for long-lived but infrequently accessed data. Benefit/Use: Cost savings for long-term storage", "q": "A company has data that must be retained long-term and is rarely accessed, but still occasionally needs rapid access, at a price below the default general-purpose tier."}, {"s": "Storage Options", "f": "S3 Intelligent-Tiering", "b": "Storage class that automatically moves data between two access tiers based on changing access patterns. Benefit/Use: Cost optimization", "q": "A company has data with access patterns that are unpredictable and constantly changing, and wants S3 to automatically move objects between cost tiers for them."}, {"s": "Storage Options", "f": "S3 Standard", "b": "Default storage class for frequently accessed data. Benefit/Use: General-purpose storage", "q": "A company stores frequently accessed website assets in S3 and needs the default, general-purpose storage class designed for that access pattern."}, {"s": "Storage Options", "f": "S3 Standard-IA", "b": "Storage class for infrequently accessed data with rapid access when needed. Benefit/Use: Cost savings for infrequent access", "q": "A company has data it accesses only about once a month but needs to retrieve it quickly, in milliseconds, at a lower storage price than the default tier."}, {"s": "Database Family", "f": "Aurora", "b": "High-performance relational database. Benefit/Use: Managed SQL", "q": "A company wants a MySQL- and PostgreSQL-compatible relational database with significantly higher throughput than standard versions of those engines, without managing the database software."}, {"s": "Database Family", "f": "DynamoDB", "b": "Managed NoSQL database. Benefit/Use: NoSQL", "q": "A mobile gaming company needs a fully managed, key-value NoSQL database that delivers consistent, single-digit-millisecond performance at any scale."}, {"s": "Database Family", "f": "RDS", "b": "Managed relational database. Benefit/Use: Managed SQL", "q": "A company wants a managed relational database where AWS handles routine tasks like patching, backups, and hardware provisioning."}, {"s": "Database Family", "f": "Read Replicas", "b": "Read-only copies of a database. Benefit/Use: Read scalability", "q": "A company's relational database is under heavy read traffic, and it wants to offload read queries to additional copies of the database to improve performance."}, {"s": "Database Family", "f": "Redshift", "b": "Managed data warehouse. Benefit/Use: Analytics", "q": "A company wants to run complex analytical SQL queries against petabytes of structured data collected from across the business for reporting."}, {"s": "Networking Tools", "f": "AWS VPN", "b": "Securely connect on-premises networks to AWS. Benefit/Use: Private connectivity", "q": "A branch office needs an encrypted connection over the public internet to a company's VPC, without the cost or lead time of a dedicated physical line."}, {"s": "Networking Tools", "f": "CloudFront", "b": "Content delivery network. Benefit/Use: Low latency content delivery", "q": "A company wants to deliver its website's static content to users around the world with low latency by caching copies at locations near its end users."}, {"s": "Networking Tools", "f": "Direct Connect", "b": "Dedicated network connection to AWS. Benefit/Use: Private connectivity", "q": "A company wants a dedicated, private network connection from its data center to AWS that bypasses the public internet for more consistent performance."}, {"s": "Networking Tools", "f": "ELB", "b": "Distributes traffic across instances. Benefit/Use: Load balancing", "q": "A company wants incoming application traffic automatically spread across multiple EC2 instances in different Availability Zones to improve fault tolerance."}, {"s": "Networking Tools", "f": "Internet Gateway", "b": "Connects VPC to the internet. Benefit/Use: Internet access", "q": "A company needs to attach a component to its VPC that allows resources in public subnets to communicate with the internet."}, {"s": "Networking Tools", "f": "NACL", "b": "Stateless subnet firewall. Benefit/Use: Subnet firewall", "q": "A company wants an extra layer of network security at the subnet level that evaluates inbound and outbound rules independently, since it does not automatically allow return traffic."}, {"s": "Networking Tools", "f": "NAT Gateway", "b": "Outbound internet for private subnets. Benefit/Use: Private outbound internet", "q": "A company has EC2 instances in a private subnet that need to reach the internet for software updates but must remain unreachable from the internet."}, {"s": "Networking Tools", "f": "Private Subnet", "b": "A subnet that is not connected to the internet and hosts resources that are not directly accessible from the internet. Benefit/Use: Secure internal resources", "q": "A company wants to place its database servers in a section of its VPC that has no direct route to the internet, isolating them from inbound internet traffic."}, {"s": "Networking Tools", "f": "Public Subnet", "b": "A subnet that is connected to the internet and can host resources accessible from the internet. Benefit/Use: Internet-facing resources", "q": "A company wants to place its web servers in a section of its VPC that has a route to an internet gateway so the servers can be reached directly from the internet."}, {"s": "Networking Tools", "f": "Route 53", "b": "Managed DNS service. Benefit/Use: Domain management", "q": "A company needs a highly available service to register domain names and route end-user requests to the correct AWS or on-premises resources."}, {"s": "Networking Tools", "f": "Route Table", "b": "Controls VPC traffic paths. Benefit/Use: Traffic routing", "q": "A network administrator needs to define where network traffic from a subnet is directed, such as to an internet gateway or a peering connection."}, {"s": "Networking Tools", "f": "Security Group", "b": "Stateful virtual firewall. Benefit/Use: Instance firewall", "q": "A company needs a firewall that operates at the instance level and automatically allows return traffic for any connection it has already approved."}, {"s": "Networking Tools", "f": "VPC", "b": "Private virtual network. Benefit/Use: Network isolation", "q": "A company wants to launch AWS resources into a logically isolated section of the cloud that it fully controls, including its own IP address range and subnets."}, {"s": "Security Services", "f": "AWS Audit Manager", "b": "Service that helps you continuously audit your AWS usage to simplify compliance. Benefit/Use: Compliance management", "q": "A compliance team wants to continuously collect evidence of how its AWS usage aligns with a specific regulatory framework, to simplify audit preparation."}, {"s": "Security Services", "f": "AWS Certificate Manager", "b": "Service for provisioning, managing, and deploying SSL/TLS certificates. Benefit/Use: Secure communication", "q": "A company running an HTTPS website on AWS wants to provision and automatically renew the SSL/TLS certificate on its load balancer, without manually tracking expiration dates."}, {"s": "Security Services", "f": "AWS Inspector", "b": "Automated security assessment service. Benefit/Use: Vulnerability management", "q": "A security team wants automated, ongoing scanning of its EC2 instances and container images for software vulnerabilities and unintended network exposure."}, {"s": "Security Services", "f": "AWS Security Hub", "b": "Centralized security and compliance service. Benefit/Use: Security posture management", "q": "A security team managing findings from several different AWS security tools wants one centralized dashboard that aggregates and prioritizes all of those findings."}, {"s": "Security Services", "f": "Amazon Cognito Identity Pools", "b": "Provides temporary AWS credentials to access AWS services. Benefit/Use: User authentication and authorization", "q": "A mobile application needs to grant its users temporary, limited AWS credentials to directly access an S3 bucket, without those users having permanent IAM accounts."}, {"s": "Security Services", "f": "Cognito", "b": "User authentication and management. Benefit/Use: User identity", "q": "A mobile app developer needs to add user sign-up, sign-in, and access control to their application without building their own identity system."}, {"s": "Security Services", "f": "Guard Duty", "b": "Threat detection service. Benefit/Use: Security monitoring", "q": "A security team wants continuous, automated threat detection that analyzes account activity, network traffic, and DNS logs for malicious behavior."}, {"s": "Security Services", "f": "IAM", "b": "Manage identities and permissions. Benefit/Use: Access control", "q": "A company needs a way to centrally control which users and applications can authenticate and what actions they're authorized to perform on AWS resources."}, {"s": "Security Services", "f": "IAM Group", "b": "A collection of IAM users. Benefit/Use: Simplified permission management", "q": "An administrator wants to attach the same set of permissions to twenty employees on the finance team at once, instead of configuring each person individually."}, {"s": "Security Services", "f": "IAM Policy", "b": "A document that defines permissions for an IAM user, group, or role. Benefit/Use: Access control", "q": "An administrator wants to write a single JSON document that explicitly defines exactly which actions are allowed or denied on which AWS resources."}, {"s": "Security Services", "f": "IAM Role", "b": "A set of permissions that define what actions are allowed and denied by an entity in AWS. Benefit/Use: Temporary access management", "q": "An EC2 instance needs temporary permissions to call other AWS services on its behalf, without embedding long-term access keys anywhere on the instance."}, {"s": "Security Services", "f": "IAM User", "b": "An entity that you create in AWS to represent the person or application that uses it to interact with AWS. Benefit/Use: Access management", "q": "A company needs to create an individual identity in AWS for a specific employee, complete with their own long-term credentials, to represent that person."}, {"s": "Security Services", "f": "IAM User Groups", "b": "Collections of IAM users that can be managed as a single entity. Benefit/Use: Simplified permission management", "q": "An administrator managing permissions for many employees wants to organize related IAM users together so permission changes only need to be made once for the whole set."}, {"s": "Security Services", "f": "KMS", "b": "Managed encryption keys. Benefit/Use: Data protection", "q": "A company needs to create and control the encryption keys used to protect its data across multiple AWS services."}, {"s": "Security Services", "f": "Principle of Least Privilege", "b": "Security principle that recommends granting only the permissions necessary to perform a task. Benefit/Use: Minimized security risk", "q": "When writing an IAM policy for a new application, a security engineer grants only the exact permissions the application needs to function, and nothing more."}, {"s": "Security Services", "f": "Secret Manager", "b": "Managed secrets storage. Benefit/Use: Secure secret management", "q": "An application needs to retrieve a database password at runtime without hardcoding it in source code, and the company wants that credential rotated automatically on a schedule."}, {"s": "Security Services", "f": "Shield", "b": "DDoS protection service. Benefit/Use: DDoS mitigation", "q": "A company wants managed protection for its internet-facing applications against distributed denial-of-service attacks."}, {"s": "Security Services", "f": "WAF", "b": "Web application firewall. Benefit/Use: Application security", "q": "A company running a public web application wants to filter and block common web exploits, such as SQL injection and cross-site scripting, before they reach the app."}, {"s": "Analytics Stack", "f": "Athena", "b": "Query data in S3 using SQL. Benefit/Use: Serverless analytics", "q": "An analyst wants to run standard SQL queries directly against data sitting in S3 without first loading it into a database or provisioning servers."}, {"s": "Analytics Stack", "f": "EMR", "b": "Managed Hadoop and Spark service. Benefit/Use: Big data processing", "q": "A company needs to process massive datasets using open-source big data frameworks like Apache Spark and Hadoop without manually managing the underlying cluster."}, {"s": "Analytics Stack", "f": "ETL", "b": "Extract, Transform, Load process for data. Benefit/Use: Data integration", "q": "A data team needs to pull data out of several source systems, reshape and clean it, and load it into a target data warehouse for analysis."}, {"s": "Analytics Stack", "f": "Glue", "b": "Managed ETL service. Benefit/Use: Data transformation", "q": "A data engineering team needs a serverless way to discover, clean, and transform data from multiple sources before loading it into a warehouse."}, {"s": "Analytics Stack", "f": "Quicksight", "b": "Managed business intelligence service. Benefit/Use: Data visualization", "q": "A business wants to build interactive dashboards and visualizations from its data without managing any BI infrastructure."}, {"s": "Management Layer", "f": "AWS APIs", "b": "Application Programming Interfaces for programmatically interacting with AWS services. Benefit/Use: Integration and automation", "q": "A third-party tool needs to programmatically create and manage AWS resources by calling AWS's underlying web service interfaces directly."}, {"s": "Management Layer", "f": "AWS CLI", "b": "Command Line Interface for managing AWS services. Benefit/Use: Automation and scripting", "q": "A systems administrator wants to script and automate AWS resource management from a terminal, issuing commands instead of clicking through the web console."}, {"s": "Management Layer", "f": "AWS SDKs", "b": "Software Development Kits for various programming languages to interact with AWS services. Benefit/Use: Simplified development", "q": "A software developer building a Python application wants to call AWS services directly from their code using idiomatic, language-specific libraries."}, {"s": "Management Layer", "f": "CloudFormation", "b": "Infrastructure as code service. Benefit/Use: Automated provisioning", "q": "A DevOps team wants to define its entire AWS infrastructure in a text template so it can provision and update resources consistently and repeatably."}, {"s": "Management Layer", "f": "CloudTrail", "b": "Records AWS API activity and console actions. Benefit/Use: Auditing", "q": "A security team needs a complete history of every API call made in its AWS account, including who made the request and when, for auditing purposes."}, {"s": "Management Layer", "f": "CloudWatch", "b": "Metrics, logs, alarms, events. Benefit/Use: Monitoring", "q": "An operations team wants to collect metrics and logs from its AWS resources and set alarms that notify them automatically when a threshold is breached."}, {"s": "Management Layer", "f": "Config Service", "b": "Tracks AWS resource configurations. Benefit/Use: Configuration management", "q": "A compliance team wants to continuously record the configuration state of its AWS resources and be alerted whenever a configuration drifts from an approved baseline."}, {"s": "Management Layer", "f": "License Manager", "b": "Manage software licenses in AWS. Benefit/Use: License compliance", "q": "A company running commercial software on AWS wants to track software license usage and avoid non-compliance and overages."}, {"s": "Management Layer", "f": "Management Console", "b": "Web-based interface for AWS services. Benefit/Use: Service management", "q": "A new AWS user with little command-line experience wants a web-based, point-and-click way to create and manage AWS resources."}, {"s": "Management Layer", "f": "Management Tools Suite", "b": "Collection of tools for managing AWS resources. Benefit/Use: Resource management", "q": "A company wants a broad category of AWS offerings that together let it provision, monitor, and operate its cloud resources."}, {"s": "Management Layer", "f": "Monitoring and Logging", "b": "Collect and analyze logs and metrics. Benefit/Use: Operational insights", "q": "An operations team wants ongoing visibility into the health and performance of its AWS resources by collecting metrics and log data over time."}, {"s": "Management Layer", "f": "OpsCenter Console", "b": "Centralized operations management. Benefit/Use: Incident management", "q": "An operations team wants a central place within Systems Manager to view, investigate, and resolve operational issues and their related resources."}, {"s": "Management Layer", "f": "Service Catalog", "b": "Create and manage approved AWS resources. Benefit/Use: Resource standardization", "q": "A large organization wants individual teams to be able to self-service deploy only pre-approved, IT-governed AWS resource configurations."}, {"s": "Management Layer", "f": "Systems Manager", "b": "Centralized management of AWS resources. Benefit/Use: Operational efficiency", "q": "An operations team wants a single interface to view operational data and automate common management tasks, like patching, across its fleet of EC2 instances."}, {"s": "DevOps Toolkit", "f": "AWS OpsWorks", "b": "Configuration management service that uses Chef and Puppet. Benefit/Use: Automated server configuration", "q": "A company already using Chef and Puppet recipes for server configuration on-premises wants to keep using those same configuration management tools after moving to AWS."}, {"s": "DevOps Toolkit", "f": "CodeArtifact", "b": "Managed artifact repository. Benefit/Use: Dependency management", "q": "A development team wants a managed repository to securely store, publish, and share software packages and their dependencies used during builds."}, {"s": "DevOps Toolkit", "f": "CodeBuild", "b": "Build and test code. Benefit/Use: Continuous integration", "q": "A development team wants a fully managed service that compiles source code, runs tests, and produces deployable packages without managing build servers."}, {"s": "DevOps Toolkit", "f": "CodeCommit", "b": "Source control service. Benefit/Use: Version control", "q": "A development team wants a fully managed private Git repository to store and version its source code."}, {"s": "DevOps Toolkit", "f": "CodeDeploy", "b": "Automated code deployment. Benefit/Use: Continuous delivery", "q": "A company wants to automate software deployments to a fleet of EC2 instances or on-premises servers while minimizing downtime during rollout."}, {"s": "DevOps Toolkit", "f": "CodePipeline", "b": "Automated release pipeline. Benefit/Use: Continuous delivery", "q": "A development team wants to model, visualize, and automate the steps of its release process, from source changes through build, test, and deployment."}, {"s": "DevOps Toolkit", "f": "Evidently Service", "b": "Feature flagging and experimentation service. Benefit/Use: Controlled feature rollout", "q": "A product team wants to safely roll out a new feature to a small percentage of users first and measure its impact before releasing it to everyone."}, {"s": "Unified Ecosystem", "f": "Billing and Cost Management", "b": "Track and manage AWS costs. Benefit/Use: Cost optimization", "q": "An account administrator wants a dashboard to track current AWS spend, view invoices, and forecast future costs across their account."}, {"s": "Unified Ecosystem", "f": "Consolidated Billing", "b": "Feature that allows you to combine billing for multiple AWS accounts. Benefit/Use: Simplified billing management", "q": "A company with ten separate AWS accounts across different departments wants to receive one single bill and combine usage to potentially reach volume discounts sooner."}, {"s": "Unified Ecosystem", "f": "Integrated logging", "b": "Centralized logging for AWS services. Benefit/Use: Log management", "q": "A company wants a consistent way to centralize log data generated across many different AWS services into one place for easier analysis."}, {"s": "Application Integration", "f": "Amazon Connect Service", "b": "Cloud-based contact center service. Benefit/Use: Customer engagement", "q": "A company wants to quickly stand up a cloud-based customer service call center without purchasing any on-premises telephony hardware."}, {"s": "Application Integration", "f": "Amazon Simple Email Service (SES)", "b": "Managed email sending service. Benefit/Use: Email communication", "q": "A company wants a cost-effective way to send marketing and transactional emails, such as order confirmations, to its customers at scale."}, {"s": "Application Integration", "f": "SNS", "b": "Managed pub/sub messaging service. Benefit/Use: Event-driven architecture", "q": "A company wants to broadcast a single event notification simultaneously to multiple subscribed endpoints, such as email addresses, SMS numbers, and other services."}, {"s": "Application Integration", "f": "SQS", "b": "Managed message queue service. Benefit/Use: Decoupling", "q": "Two decoupled application components need a reliable way to pass messages, with messages held in a queue until the receiving component is ready to process them."}, {"s": "Governance & Compliance", "f": "Amazon Artifact Compliance Reports", "b": "Provides on-demand access to AWS compliance reports. Benefit/Use: Compliance documentation", "q": "A company's auditor requests copies of AWS's official compliance and security certification reports, such as SOC or ISO reports, for a third-party risk assessment."}, {"s": "Governance & Compliance", "f": "Compliance", "b": "Adherence to regulatory standards. Benefit/Use: Regulatory compliance", "q": "A healthcare company must ensure its AWS workloads meet HIPAA regulatory requirements before going live."}, {"s": "Governance & Compliance", "f": "Control Tower", "b": "Automated multi-account setup and governance. Benefit/Use: An easy way to establish a landing zone that implements an AWS well-architected multi-account environment and applies the AWS best practices", "q": "A company setting up a brand-new multi-account AWS environment wants an automated way to establish a baseline landing zone that follows AWS best practices from day one."}, {"s": "Governance & Compliance", "f": "Disaster Recovery", "b": "Strategies to recover from failures. Benefit/Use: Business continuity", "q": "A company wants a documented plan and set of strategies for how it will restore IT systems and data after an outage or catastrophic failure."}, {"s": "Governance & Compliance", "f": "Elastic DR", "b": "Automated disaster recovery service. Benefit/Use: Rapid recovery", "q": "A company wants to continuously replicate its servers to AWS so it can fail over to a recovery environment within minutes of a disaster."}, {"s": "Gov rvice & Deployment Models", "f": "Software as a Service (SaaS)", "b": "Cloud computing model providing software applications over the internet on a subscription basis. Benefit/Use: Accessibility and cost-effectiveness", "q": "A company wants to pay a subscription fee to use a ready-made application over the internet, with the vendor responsible for hosting, maintenance, and updates."}, {"s": "Migration & Transfer", "f": "AWS Application Discovery Service", "b": "Service that helps you plan application migration projects by automatically identifying applications running in your data center. Benefit/Use: Migration planning", "q": "A company planning a large migration doesn't have accurate documentation of what applications and dependencies are running in its data center and wants to discover them automatically."}, {"s": "Migration & Transfer", "f": "AWS Database Migration Service", "b": "Service that helps you migrate databases to AWS easily and securely. Benefit/Use: Database migration", "q": "A company wants to migrate its on-premises Oracle database to Amazon RDS with minimal downtime, while the source database keeps running during the migration."}, {"s": "Migration & Transfer", "f": "AWS Server Migration Service", "b": "Service that helps you migrate on-premises workloads to AWS. Benefit/Use: Simplified migration", "q": "A company wants to incrementally replicate live on-premises virtual machine servers to AWS to minimize cutover time during a migration."}, {"s": "Migration & Transfer", "f": "AWS Snowball", "b": "Data transport solution for moving large amounts of data into and out of AWS and built-in computing capabilities that allow customers to process data locally. Benefit/Use: Efficient data transfer", "q": "A company needs to transfer 80 terabytes of on-premises data into AWS, but its internet connection would take months, so it wants AWS to ship it a physical storage device instead."}, {"s": "Migration & Transfer", "f": "AWS Snowmobile", "b": "Exabyte-scale const SECTION_SUFFIX = {"Compute Suite": "Which AWS service should they use?", "Storage Options": "Which AWS storage service or storage class should they use?", "Database Family": "Which AWS database service or feature should they use?", "Networking Tools": "Which AWS networking service or component should they use?", "Security Services": "Which AWS security service, resource, or best practice does this describe?", "Analytics Stack": "Which AWS analytics service should they use?", "Management Layer": "Which AWS management tool or interface should they use?", "DevOps Toolkit": "Which AWS DevOps service should they use?", "Unified Ecosystem": "Which AWS billing or logging capability does this describe?", "Application Integration": "Which AWS service should they use?", "Governance & Compliance": "Which AWS governance or compliance capability does this describe?", "Support & Procurement": "Which AWS support or procurement option does this describe?", "Pricing & Purchasing Options": "Which pricing concept or purchasing option does this describe?", "Service & Deployment Models": "Which cloud concept or service model does this describe?", "Migration & Transfer": "Which AWS migration service or concept should they use?", "Application Architecture": "Which architectural concept does this describe?", "Cloud Concepts & Fundamentals": "Which cloud computing concept does this describe?"};

const sectionSelect = document.getElementById('quiz-section-select');
const countSelect = document.getElementById('quiz-count-select');
const modeDefBtn = document.getElementById('mode-def-btn');
const modeExamBtn = document.getElementById('mode-exam-btn');
const modeDesc = document.getElementById('quiz-mode-desc');

let currentMode = 'def';

function activeCards() {
  return currentMode === 'exam' ? CARDS_EXAM : CARDS_DEF;
}

function updateModeDesc() {
  if (currentMode === 'exam') {
    modeDesc.textContent = CARDS_EXAM.length + ' scenario-based questions written in the style of the real CCP exam. Pick a section and question count, then go.';
  } else {
    const domainCount = new Set(CARDS_DEF.map(c => c.s)).size;
    modeDesc.textContent = CARDS_DEF.length + ' flashcards across ' + domainCount + ' domains. Pick a section and question count, then go.';
  }
}

function populateSections() {
  const cards = activeCards();
  const sections = [...new Set(cards.map(c => c.s))];
  sectionSelect.innerHTML = '<option value="all">All sections (' + cards.length + ' cards)</option>' +
    sections.map(s => {
      const n = cards.filter(c => c.s === s).length;
      return '<option value="' + s + '">' + s + ' (' + n + ')</option>';
    }).join('');
}

function refreshCounts() {
  const pool = getPool();
  const opts = [5, 10, 15, 20, 30, 50].filter(n => n <= pool.length);
  opts.push(pool.length);
  const uniq = [...new Set(opts)];
  countSelect.innerHTML = uniq.map(n => '<option value="' + n + '">' + n + (n === pool.length ? ' (all)' : '') + '</option>').join('');
}

function getPool() {
  const sec = sectionSelect.value || 'all';
  const cards = activeCards();
  return sec === 'all' ? cards : cards.filter(c => c.s === sec);
}

function setMode(mode) {
  currentMode = mode;
  modeDefBtn.classList.toggle('active', mode === 'def');
  modeExamBtn.classList.toggle('active', mode === 'exam');
  updateModeDesc();
  populateSections();
  refreshCounts();
}

modeDefBtn.addEventListener('click', () => setMode('def'));
modeExamBtn.addEventListener('click', () => setMode('exam'));
sectionSelect.addEventListener('change', refreshCounts);

setMode('def');

let quizCards = [];
let idx = 0;
let score = 0;
let missed = [];
let locked = false;
let quizMode = 'def';   // mode the current run was started in (def or exam)
let forcedDirs = [];    // per-question forced direction for review runs; empty otherwise

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestion(card, forceAskFront) {
  if (currentMode === 'exam') {
    // Prefer distractors from the same section first (plausible, exam-like
    // wrong answers); top up from the full pool if the section is too small.
    const sameSection = shuffle(activeCards().filter(c => c !== card && c.s === card.s));
    const distractors = sameSection.slice(0, 3).map(c => c.f);
    if (distractors.length < 3) {
      const rest = shuffle(activeCards().filter(c => c !== card && !distractors.includes(c.f)));
      for (const c of rest) {
        if (distractors.length === 3) break;
        distractors.push(c.f);
      }
    }
    const options = shuffle([card.f, ...distractors]);
    return { mode: 'exam', correct: card.f, options };
  }

  const askFront = (forceAskFront === undefined) ? (Math.random() < 0.5) : forceAskFront;
  const prompt = askFront ? card.f : card.b;
  const label = askFront ? 'Which service or concept is this?' : 'What does this do?';
  const correct = askFront ? card.b : card.f;
  const others = shuffle(activeCards().filter(c => c !== card));
  const distractors = [];
  for (const c of others) {
    const val = askFront ? c.b : c.f;
    if (val !== correct && !distractors.includes(val)) distractors.push(val);
    if (distractors.length === 3) break;
  }
  const options = shuffle([correct, ...distractors]);
  return { mode: 'def', label, prompt, correct, options, askFront };
}

document.getElementById('quiz-start-btn').addEventListener('click', () => {
  const pool = getPool();
  const n = parseInt(countSelect.value, 10);
  quizCards = shuffle(pool).slice(0, n);
  forcedDirs = [];
  quizMode = currentMode;
  idx = 0;
  score = 0;
  missed = [];
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  renderQuestion();
});

function renderQuestion() {
  locked = false;
  const card = quizCards[idx];
  const forced = forcedDirs.length ? forcedDirs[idx] : undefined;
  const q = buildQuestion(card, forced);
  document.getElementById('quiz-progress-text').textContent = 'Question ' + (idx + 1) + ' of ' + quizCards.length;
  document.getElementById('quiz-score-text').textContent = 'Score: ' + score;
  document.getElementById('quiz-progress-fill').style.width = Math.round((idx / quizCards.length) * 100) + '%';

  const suffixEl = document.getElementById('quiz-question-suffix');
  if (q.mode === 'exam') {
    document.getElementById('quiz-question-label').textContent = card.s;
    document.getElementById('quiz-question-text').textContent = card.q;
    suffixEl.textContent = SECTION_SUFFIX[card.s] || 'Which AWS service or concept best fits this?';
    suffixEl.style.display = 'block';
  } else {
    document.getElementById('quiz-question-label').textContent = q.label + '  ·  ' + card.s;
    document.getElementById('quiz-question-text').textContent = q.prompt;
    suffixEl.textContent = '';
    suffixEl.style.display = 'none';
  }

  const feedback = document.getElementById('quiz-feedback');
  feedback.textContent = '';
  feedback.className = 'quiz-feedback';
  const defBox = document.getElementById('quiz-definition');
  defBox.style.display = 'none';
  defBox.textContent = '';
  document.getElementById('quiz-next-btn').style.display = 'none';

  const optWrap = document.getElementById('quiz-options');
  optWrap.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectOption(opt, q, card, btn));
    optWrap.appendChild(btn);
  });
}

function selectOption(opt, q, card, btn) {
  if (locked) return;
  locked = true;
  const isCorrect = opt === q.correct;
  const feedback = document.getElementById('quiz-feedback');
  const promptText = q.mode === 'exam' ? card.q : q.prompt;

  if (isCorrect) {
    score++;
    btn.classList.add('correct');
    feedback.textContent = 'Correct.';
    feedback.className = 'quiz-feedback correct';
  } else {
    btn.classList.add('incorrect');
    feedback.textContent = 'Not quite. Correct answer: ' + q.correct;
    feedback.className = 'quiz-feedback incorrect';
    missed.push({
      prompt: promptText,
      correct: q.correct,
      given: opt,
      section: card.s,
      definition: q.mode === 'exam' ? card.b : '',
      card: card,
      askFront: q.mode === 'exam' ? undefined : q.askFront
    });
  }

  [...document.getElementById('quiz-options').children].forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct) b.classList.add('correct');
  });

  if (q.mode === 'exam') {
    const defBox = document.getElementById('quiz-definition');
    defBox.textContent = card.f + ' — ' + card.b;
    defBox.style.display = 'block';
  }

  document.getElementById('quiz-score-text').textContent = 'Score: ' + score;
  document.getElementById('quiz-next-btn').style.display = 'block';
}

document.getElementById('quiz-next-btn').addEventListener('click', () => {
  idx++;
  if (idx >= quizCards.length) {
    showResults();
  } else {
    renderQuestion();
  }
});

function showResults() {
  document.getElementById('quiz-progress-fill').style.width = '100%';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'block';

  const pct = Math.round((score / quizCards.length) * 100);
  document.getElementById('quiz-final-score').textContent = score + '/' + quizCards.length;
  document.getElementById('quiz-final-pct').textContent = pct + '%';

  const reviewBtn = document.getElementById('quiz-review-btn');
  if (missed.length > 0) {
    reviewBtn.style.display = 'block';
    reviewBtn.textContent = 'Review What You Missed (' + missed.length + ')';
  } else {
    reviewBtn.style.display = 'none';
  }

  const reviewList = document.getElementById('quiz-review-list');
  if (missed.length === 0) {
    reviewList.innerHTML = '<p style="color: var(--white-dim); font-family: var(--font-mono); font-size: 0.85rem;">No misses. Clean sweep.</p>';
  } else {
    reviewList.innerHTML = missed.map(m => `
      <div class="quiz-review-item">
        <span class="quiz-review-section">${m.section}</span>
        <p class="quiz-review-prompt">${m.prompt}</p>
        <p class="quiz-review-given">Your answer: ${m.given}</p>
        <p class="quiz-review-correct">Correct: ${m.correct}</p>
        ${m.definition ? `<p style="font-size:0.78rem;color:var(--white-ghost);margin:0.4rem 0 0;">${m.definition}</p>` : ''}
      </div>
    `).join('');
  }
}

document.getElementById('quiz-review-btn').addEventListener('click', () => {
  if (!missed.length) return;
  // Re-quiz ONLY the cards missed in the run that just finished. Pair each missed
  // card with the direction it was asked in (def mode), then shuffle the pairs so
  // order varies while keeping card and direction aligned. All state is in-memory,
  // so this is scoped to this user, this tab, this session.
  const pairs = shuffle(missed.map(m => ({ card: m.card, dir: m.askFront })));
  quizCards = pairs.map(p => p.card);
  forcedDirs = pairs.map(p => p.dir);
  currentMode = quizMode;   // review in the same mode the quiz was taken in
  idx = 0;
  score = 0;
  missed = [];
  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  renderQuestion();
});

document.getElementById('quiz-restart-btn').addEventListener('click', () => {
  document.getElementById('quiz-results').style.display = 'none';
  document.getElementById('quiz-setup').style.display = 'block';
});
</script>
<script src="cursor.js"></script>
</body>
</html>
