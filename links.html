<link rel="stylesheet" href="style.css"/>
<style>
  body {
    background: radial-gradient(ellipse 620px 420px at 50% 0%, rgba(15, 240, 252, 0.09), transparent 70%), var(--navy-deep);
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--white-pure);
    display: flex;
    justify-content: center;
    padding: 3.5rem 1.25rem 3rem;
  }

  .links-wrap { width: 100%; max-width: 440px; }

  .links-profile { text-align: center; margin-bottom: 2.2rem; }

  .links-avatar {
    width: 92px;
    height: 92px;
    border-radius: 50%;
    margin: 0 auto 1.2rem;
    background: linear-gradient(135deg, rgba(15, 240, 252, 0.28), rgba(15, 240, 252, 0.04));
    border: 2px solid rgba(15, 240, 252, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 1.7rem;
    font-weight: 700;
    color: var(--white-pure);
  }
  /* Swap the avatar for a real photo by replacing the div above with:
     <img src="your-photo.jpg" alt="Your name" class="links-avatar" style="object-fit:cover;"/> */

  .links-name { font-size: 1.35rem; margin-bottom: 0.5rem; display: inline-block; }
  .links-bio {
    color: var(--white-dim);
    font-size: 0.92rem;
    max-width: 320px;
    margin: 0 auto;
    line-height: 1.55;
  }

  .links-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 0.9rem;
    width: 100%;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(15, 240, 252, 0.22);
    border-radius: 12px;
    padding: 0.95rem 1.15rem;
    color: var(--white-pure);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 0.98rem;
    font-weight: 500;
    transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
  }
  .link-btn:hover {
    border-color: var(--cyan-glow);
    background: rgba(15, 240, 252, 0.06);
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(15, 240, 252, 0.15);
  }
  .link-btn:active { transform: translateY(0); }
  .link-icon { flex-shrink: 0; width: 22px; height: 22px; color: var(--cyan-soft); transition: color 0.2s; }
  .link-btn:hover .link-icon { color: var(--cyan-glow); }
  .link-label { flex: 1; }
  .link-arrow { flex-shrink: 0; font-family: var(--font-mono); font-size: 0.85rem; color: var(--white-ghost); }

  .links-footer {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    color: var(--white-ghost);
  }
  .links-footer a { color: var(--cyan-soft); text-decoration: none; }
  .links-footer a:hover { color: var(--cyan-glow); }
</style>
</head>
